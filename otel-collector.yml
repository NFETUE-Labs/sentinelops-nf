receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317

processors:
  batch:
    timeout: 1s

exporters:
  prometheus:
    endpoint: "0.0.0.0:8889"
  
  debug:
    verbosity: detailed

  otlp/jaeger:
    endpoint: "jaeger:4317"
    tls:
      insecure: true

  clickhouse:
    endpoint: tcp://clickhouse:9000?dial_timeout=10s
    database: sentinelops
    username: admin
    password: sentinel123
    traces_table_name: traces
    ttl: 72h
    timeout: 5s
    retry_on_failure:
      enabled: true

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug, otlp/jaeger, clickhouse]
    
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus]